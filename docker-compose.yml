services:

  app:
    build: .
    container_name: medical-app

    ports:
      - "5000:5000"

    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: medical-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: medical_db

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./medical_db.sql:/docker-entrypoint-initdb.d/medical_db.sql

volumes:
  mysql-data: